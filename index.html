<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고요로 (GOYO-RO)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f5f5f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* 모바일 디바이스 프레임 (PC에서 볼 때 폰처럼 보이게 함) */
        #app-container {
            width: 100%;
            max-width: 430px; /* 아이폰 Pro Max 너비 기준 */
            height: 100vh;
            max-height: 932px;
            background-color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* 각 화면 공통 스타일 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            pointer-events: none; /* 안 보이는 화면은 터치 방지 */
            transition: opacity 0.4s ease-in-out; /* 부드러운 페이드 효과 */
            z-index: 1;
        }

        /* 현재 활성화된 화면 */
        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* 투명한 터치 영역 (Hotspot) */
        .hotspot {
            position: absolute;
            cursor: pointer;
            /* 개발할 때 버튼 위치 보려면 아래 주석을 푸세요 */
            /* background-color: rgba(255, 0, 0, 0.3); */ 
        }

        /* 각 이미지 로드 (파일명 띄어쓰기, 확장자 정확히 매칭) */
        #screen-1 { background-image: url('1-시작.jpg'); }
        #screen-2 { background-image: url('2-메인.jpg'); }
        #screen-3-map { background-image: url('3-퀘스트.png'); }
        #screen-3-detox { background-image: url('3-디톡스 시작.jpg'); }
        #screen-5 { background-image: url('5-디톡스중.jpg'); }
        #screen-6 { background-image: url('6-성공.png'); }
        #screen-7 { background-image: url('7-도감.jpg'); }
        #screen-8 { background-image: url('8-리워드.jpg'); }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="screen-1" class="screen active">
        <div class="hotspot" style="bottom: 10%; left: 10%; width: 80%; height: 10%;" onclick="goTo('screen-2')"></div>
    </div>

    <div id="screen-2" class="screen">
        <div class="hotspot" style="bottom: 15%; left: 10%; width: 80%; height: 10%;" onclick="goTo('screen-3-detox')"></div>
        <div class="hotspot" style="bottom: 0%; left: 20%; width: 20%; height: 10%;" onclick="goTo('screen-3-map')"></div>
        <div class="hotspot" style="bottom: 0%; left: 80%; width: 20%; height: 10%;" onclick="goTo('screen-8')"></div>
        <div class="hotspot" style="bottom: 0%; left: 60%; width: 20%; height: 10%;" onclick="goTo('screen-7')"></div>
    </div>

    <div id="screen-3-map" class="screen">
        <div class="hotspot" style="top: 0; left: 0; width: 100%; height: 100%;" onclick="goTo('screen-2')"></div>
    </div>

    <div id="screen-3-detox" class="screen">
        <div class="hotspot" style="bottom: 18%; left: 10%; width: 80%; height: 8%;" onclick="goTo('screen-5')"></div>
        <div class="hotspot" style="bottom: 8%; left: 10%; width: 80%; height: 8%;" onclick="goTo('screen-2')"></div>
    </div>

    <div id="screen-5" class="screen">
        <div class="hotspot" style="bottom: 8%; left: 10%; width: 80%; height: 10%;" onclick="goTo('screen-6')"></div>
    </div>

    <div id="screen-6" class="screen">
        <div class="hotspot" style="bottom: 15%; left: 25%; width: 50%; height: 10%;" onclick="goTo('screen-7')"></div>
    </div>

    <div id="screen-7" class="screen">
        <div class="hotspot" style="bottom: 0%; left: 0%; width: 25%; height: 10%;" onclick="goTo('screen-2')"></div>
    </div>

    <div id="screen-8" class="screen">
        <div class="hotspot" style="bottom: 0%; left: 0%; width: 25%; height: 10%;" onclick="goTo('screen-2')"></div>
        <div class="hotspot" style="bottom: 12%; left: 10%; width: 80%; height: 8%;" onclick="goTo('screen-2')"></div>
    </div>

</div>

<script>
    // 화면 전환을 담당하는 자바스크립트 함수
    function goTo(targetScreenId) {
        // 모든 화면에서 active 클래스 제거 (숨김)
        const screens = document.querySelectorAll('.screen');
        screens.forEach(screen => {
            screen.classList.remove('active');
        });

        // 타겟 화면에만 active 클래스 추가 (보여줌)
        const targetScreen = document.getElementById(targetScreenId);
        if(targetScreen) {
            targetScreen.classList.add('active');
        }
    }
</script>

</body>
</html>
